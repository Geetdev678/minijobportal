name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies (server)
      run: |
        cd server
        npm install

    - name: Install dependencies (client)
      run: |
        cd client
        npm install

    - name: Lint
      run: |
        cd client
        npm run lint

    - name: Build client
      run: |
        cd client
        npm run build
services:
  - type: web
    name: mini-job-portal-backend
    env: node
    plan: starter
    branch: master
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: REPLACE_WITH_MONGO_URI
      - key: JWT_SECRET
        value: REPLACE_WITH_JWT_SECRET
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        value: https://your-frontend-site.onrender.com

  - type: static
    name: mini-job-portal-frontend
    plan: starter
    branch: master
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://your-backend-site.onrender.com/api/v1
